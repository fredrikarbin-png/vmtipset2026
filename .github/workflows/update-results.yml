name: Update Match Results

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Kor uppdatering
        run: node scripts/update-results.js
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}

      - name: Commit andringar
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/matches.json
          git diff --cached --quiet || git commit -m "Automatisk resultatuppdatering"
          git push
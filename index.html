<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VM-tipset 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🏆 VM-tipset 2026</h1>
  <nav>
    <button onclick="showView('home')">Hem</button>
    <button onclick="showView('leaderboard')">Ställning</button>
    <button onclick="showView('matches')">Matcher</button>
    <button onclick="showView('players')">Deltagare</button>
    <button onclick="showView('stats')">Statistik</button>
  </nav>
</header>

<main class="container">

<section id="home" class="view">
  <div class="hero-card">
    <h2>🏆 Aktuell ställning</h2>
    <div id="podium"></div>
    <div id="lastUpdated" class="small-stat"></div>
  </div>

  <div class="card">
    <h2>⏳ Nästa match</h2>
    <div id="nextMatch"></div>
  </div>

  <div class="card">
    <h2>🔥 Flest 4-poängare</h2>
    <div id="homeFourPointers"></div>
  </div>

  <div class="card">
    <h2>Senaste matcher</h2>
    <div id="latestMatches"></div>
  </div>

  <div class="card">
    <h2>Alla deltagare</h2>
    <div id="homeLeaderboard"></div>
  </div>
</section>

  <section id="leaderboard" class="view hidden">
    <div class="card">
      <h2>🏆 Ställning</h2>
      <div id="leaderboardList"></div>
    </div>
  </section>

  <section id="matches" class="view hidden">
    <div class="card">
      <h2>⚽ Alla matcher</h2>
      <div id="matchesList"></div>
    </div>
  </section>

  <section id="players" class="view hidden">
    <div class="card">
      <h2>👥 Deltagare</h2>
      <div id="playersList"></div>
    </div>
  </section>

  <section id="stats" class="view hidden">
    <div class="card">
      <h2>📊 Statistik</h2>
      <div id="statsList">Kommer snart...</div>
    </div>
  </section>

</main>

<script src="script.js?v=13"></script>
</body>
</html>
